# switch to C-a (like screen) instead of C-b as control keybind
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# use vi-style bindings in copy mode (scrollback)
set -g mode-keys vi

# fix truecolor in some terminals
set -g default-terminal 'tmux-256color'
# also override Ms=... (OSC 52 clipboard interaction)
# %p1%s renders as empty string (default clipboard), which Alacritty takes to mean the Ctrl-C clipboard
# adding p beforehand means it renders as p, which indicates the selection buffer
set -ga terminal-overrides ',alacritty:Tc:Ms=\033]52;p%p1%s;%p2%s\a,xterm-256color:Tc'

# make the status bar less bright
set -g status-bg '#363a4f'  # surface0
set -g status-fg '#b8c0e0'  # subtext1
set -g window-status-current-style 'fg=#f5a97f'  # peach
set -g status-interval 1
# continuum sticks some extra stuff on this when it loads
set -g status-right '#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}%Y-%m-%dT%H:%M:%S'

# on macOS, tmux terminfo isn't available (because of course it isn't)
if-shell 'uname | grep -q Darwin' 'set -g default-terminal screen-256color'

# xonsh executed outside tmux shouldn't block xonsh inside it
set-environment -g -u WLR_XONSH

# propagate truecolor support to shells inside tmux
set-environment -g COLORTERM truecolor

set -g set-clipboard on

### keybinds

# switch tabs with Ctrl-Page{Up,Down}, move tabs with Shift-<same>
bind -n C-Pageup select-window -t -1
bind -n C-Pagedown select-window -t +1
bind -n C-S-Pageup swap-window -t -1 \; select-window -t -1
bind -n C-S-Pagedown swap-window -t +1 \; select-window -t +1

# split windows spanning {left,right,,above,below} with prefix + {\,|,_,-}
# split windows non-spanning with Alt-<same>
# note: rebound below
bind \\ split-window -f -h -b
bind | split-window -f -h
bind _ split-window -f -v -b
bind - split-window -f -v
bind M-\\ split-window -h -b
bind M-| split-window -h
bind M-_ split-window -v -b
bind M-- split-window -v
unbind '"'
unbind %

# navigate between panes with Ctrl-Alt-{Left,Right,Up,Down}, swap panes with Shift-<same>
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D
bind -n C-S-M-Left select-pane -L \; swap-pane -t !
bind -n C-S-M-Right select-pane -R \; swap-pane -t !
bind -n C-S-M-Up select-pane -U \; swap-pane -t !
bind -n C-S-M-Down select-pane -D \; swap-pane -t !

# resize windows with Ctrl-Shift-{Left,Right,Up,Down}
bind -n C-S-Left resize-pane -L
bind -n C-S-Right resize-pane -R
bind -n C-S-Up resize-pane -U
bind -n C-S-Down resize-pane -D

# kill current session and switch to a new one with prefix + Ctrl-s
# from https://unix.stackexchange.com/a/342659/50429
bind-key C-s \
  if-shell "(($(tmux display -p '#{session_many_attached}') > 0))" \
    choose-session \
    "run-shell \"tmux choose-session \\\"switch-client -t '%%'; kill-session -t '$(tmux display -p '#S')'\\\"\""


### WINDOWNAV keybinds
# Custom escape sequences for pane-scope and tab operations from the
# WINDOWNAV keyboard layer. Terminal emulators translate F13-F24 + modifier
# key events into these sequences. See docs/windownav-host-keybinds.md.

# --- User-key definitions (escape sequence → key name) ---

# Pane navigate
set -s user-keys[0] "\033[200~"
set -s user-keys[1] "\033[201~"
set -s user-keys[2] "\033[202~"
set -s user-keys[3] "\033[203~"

# Pane move (swap)
set -s user-keys[4] "\033[204~"
set -s user-keys[5] "\033[205~"
set -s user-keys[6] "\033[206~"
set -s user-keys[7] "\033[207~"

# Pane resize
set -s user-keys[8] "\033[208~"
set -s user-keys[9] "\033[209~"
set -s user-keys[10] "\033[210~"
set -s user-keys[11] "\033[211~"

# Pane consume (join-pane)
set -s user-keys[12] "\033[212~"
set -s user-keys[13] "\033[213~"
set -s user-keys[14] "\033[214~"
set -s user-keys[15] "\033[215~"

# Pane emit (break-pane)
set -s user-keys[16] "\033[216~"
set -s user-keys[17] "\033[217~"
set -s user-keys[18] "\033[218~"
set -s user-keys[19] "\033[219~"

# Pane one-shot
set -s user-keys[20] "\033[220~"   # fullscreen pane
set -s user-keys[21] "\033[221~"   # float pane
set -s user-keys[22] "\033[222~"   # close pane
set -s user-keys[23] "\033[223~"   # create pane
set -s user-keys[24] "\033[224~"   # zoom pane

# Tab (tmux window) operations
set -s user-keys[25] "\033[225~"
set -s user-keys[26] "\033[226~"
set -s user-keys[27] "\033[227~"
set -s user-keys[28] "\033[228~"

# --- Bindings (key name → tmux command) ---

# Pane navigate: select-pane in direction
bind -n User0 select-pane -L
bind -n User1 select-pane -U
bind -n User2 select-pane -D
bind -n User3 select-pane -R

# Pane move: select adjacent pane then swap with previous
bind -n User4 select-pane -L \; swap-pane -t !
bind -n User5 select-pane -U \; swap-pane -t !
bind -n User6 select-pane -D \; swap-pane -t !
bind -n User7 select-pane -R \; swap-pane -t !

# Pane resize: grow/shrink by 5 cells
bind -n User8 resize-pane -L 5
bind -n User9 resize-pane -U 5
bind -n User10 resize-pane -D 5
bind -n User11 resize-pane -R 5

# Pane consume: join pane from last window (direction determines split orientation)
bind -n User12 join-pane -h -s !
bind -n User13 join-pane -v -s !
bind -n User14 join-pane -v -s !
bind -n User15 join-pane -h -s !

# Pane emit: break current pane to new window
bind -n User16 break-pane -d
bind -n User17 break-pane -d
bind -n User18 break-pane -d
bind -n User19 break-pane -d

# Pane one-shot
bind -n User20 resize-pane -Z      # fullscreen → zoom (closest equivalent)
# User21 (float) - no tmux equivalent, no binding
bind -n User22 kill-pane            # close
bind -n User23 split-window -h      # create
bind -n User24 resize-pane -Z       # zoom

# Tab (tmux window) navigate and move
bind -n User25 select-window -t -1
bind -n User26 select-window -t +1
bind -n User27 swap-window -t -1 \; select-window -t -1
bind -n User28 swap-window -t +1 \; select-window -t +1


### plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-save 'S'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'psql watch mosh-client'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
