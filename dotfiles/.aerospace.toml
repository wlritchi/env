# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = ['exec-and-forget autokbisw']

# can't enable this or SentinelOne throws a fit, run at boot some other way
start-at-login = false

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 0

# Possible values: tiles|accordion
default-root-container-layout = 'accordion'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
# aerospace doesn't parse key symbols from the keyboard layout, it assumes raw position-based keycodes are fine
# but then it uses key symbols for definitions below :facepalm: so it needs to know what layout to assume
key-mapping.preset = 'dvorak'

# See https://nikitabobko.github.io/AeroSpace/guide#exec-env-vars
[exec]                   # Again, you don't need to copy all config sections to your config.
inherit-env-vars = true  # If you don't touch "exec" section,
[exec.env-vars]          # it will fallback to "default-config.toml"
PATH = '~/.nix-profile/bin:/usr/local/bin:/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

alt-space = 'exec-and-forget ~/.wlrenv/bin/aerospace/wlr-aerospace-rotate-layout'
alt-shift-enter = 'exec-and-forget open -n -a Ghostty.app --args --working-directory=$HOME'
alt-backtick = 'exec-and-forget open -n -a Ghostty.app --args -e ~/.nix-profile/bin/k9s'

alt-j = 'focus left --boundaries-action wrap-around-the-workspace'
alt-k = 'focus right --boundaries-action wrap-around-the-workspace'
alt-shift-j = 'move left'
alt-shift-k = 'move right'

# aerospace binds by keycode instead of keysym, which is very annoying
# add bindings for its misunderstanding of Moonlander keystrokes since it presents as qwerty but dvorak is set above
alt-h = 'focus left --boundaries-action wrap-around-the-workspace'
alt-t = 'focus right --boundaries-action wrap-around-the-workspace'
alt-shift-h = 'move left'
alt-shift-t = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-keypad1 = 'workspace 1'
alt-keypad2 = 'workspace 2'
alt-keypad3 = 'workspace 3'
alt-keypad4 = 'workspace 4'
alt-keypad5 = 'workspace 5'
alt-keypad6 = 'workspace 6'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-keypad1 = 'move-node-to-workspace 1'
alt-shift-keypad2 = 'move-node-to-workspace 2'
alt-shift-keypad3 = 'move-node-to-workspace 3'
alt-shift-keypad4 = 'move-node-to-workspace 4'
alt-shift-keypad5 = 'move-node-to-workspace 5'
alt-shift-keypad6 = 'move-node-to-workspace 6'

alt-shift-c = 'close --quit-if-last-window'
# no way to fix this binding on Moonlander, it'd be over alt-shift-j

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
alt-tab = 'workspace-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

alt-cmd-up = 'workspace prev'
alt-cmd-down = 'workspace next'

# === WINDOWNAV keybinds ===
# Synthetic keybinds from ZSA Moonlander WINDOWNAV layer.
# On macOS, F13-F20 are native key names (no XKB remapping needed).
# Pane scope (Cmd+F-keys) passes through to Ghostty -> tmux (not bound here).
# Reference: ~/qmk_firmware/docs/windownav-host-keybinds.md

# --- Directional: Window scope (no scope modifier) ---
# Navigate
f13 = 'focus left --boundaries-action wrap-around-the-workspace'
f14 = 'focus up --boundaries-action wrap-around-the-workspace'
f15 = 'focus down --boundaries-action wrap-around-the-workspace'
f16 = 'focus right --boundaries-action wrap-around-the-workspace'
# Move
shift-f13 = 'move left'
shift-f14 = 'move up'
shift-f15 = 'move down'
shift-f16 = 'move right'
# Resize
ctrl-f13 = 'resize width -50'
ctrl-f14 = 'resize height -50'
ctrl-f15 = 'resize height +50'
ctrl-f16 = 'resize width +50'

# --- Directional: Workspace scope (Alt modifier) ---
# Navigate
alt-f14 = 'workspace prev'
alt-f15 = 'workspace next'
# Move (follow window)
alt-shift-f14 = 'move-node-to-workspace --focus-follows-window prev'
alt-shift-f15 = 'move-node-to-workspace --focus-follows-window next'

# --- Directional: Monitor scope (Alt+Cmd modifier) ---
# Navigate
alt-cmd-f13 = 'focus-monitor left'
alt-cmd-f14 = 'focus-monitor up'
alt-cmd-f15 = 'focus-monitor down'
alt-cmd-f16 = 'focus-monitor right'
# Move (follow window)
alt-cmd-shift-f13 = 'move-node-to-monitor --focus-follows-window left'
alt-cmd-shift-f14 = 'move-node-to-monitor --focus-follows-window up'
alt-cmd-shift-f15 = 'move-node-to-monitor --focus-follows-window down'
alt-cmd-shift-f16 = 'move-node-to-monitor --focus-follows-window right'

# --- Consume (F17-F20, Window scope) ---
# join-with is the closest AeroSpace equivalent to niri's consume-window-into-column
f17 = 'join-with left'
f18 = 'join-with up'
f19 = 'join-with down'
f20 = 'join-with right'

# --- Emit (F21-F24) --- NOT SUPPORTED by AeroSpace (max f20)

# --- One-shot: Window scope (Ctrl+Shift + F17-F20) ---
ctrl-shift-f17 = 'fullscreen'
ctrl-shift-f18 = 'layout floating tiling'
ctrl-shift-f19 = 'close --quit-if-last-window'
ctrl-shift-f20 = 'exec-and-forget open -n -a Ghostty.app --args --working-directory=$HOME'
# ctrl-shift-f21 would be zoom — NOT SUPPORTED (f21)

# --- Absolute workspace (Ctrl+Alt+Cmd + number, no follow) ---
ctrl-alt-cmd-1 = 'workspace 1'
ctrl-alt-cmd-2 = 'workspace 2'
ctrl-alt-cmd-3 = 'workspace 3'
ctrl-alt-cmd-4 = 'workspace 4'
ctrl-alt-cmd-5 = 'workspace 5'
ctrl-alt-cmd-6 = 'workspace 6'
ctrl-alt-cmd-7 = 'workspace 7'
ctrl-alt-cmd-8 = 'workspace 8'
ctrl-alt-cmd-9 = 'workspace 9'
ctrl-alt-cmd-shift-1 = 'move-node-to-workspace 1'
ctrl-alt-cmd-shift-2 = 'move-node-to-workspace 2'
ctrl-alt-cmd-shift-3 = 'move-node-to-workspace 3'
ctrl-alt-cmd-shift-4 = 'move-node-to-workspace 4'
ctrl-alt-cmd-shift-5 = 'move-node-to-workspace 5'
ctrl-alt-cmd-shift-6 = 'move-node-to-workspace 6'
ctrl-alt-cmd-shift-7 = 'move-node-to-workspace 7'
ctrl-alt-cmd-shift-8 = 'move-node-to-workspace 8'
ctrl-alt-cmd-shift-9 = 'move-node-to-workspace 9'

[workspace-to-monitor-force-assignment]
1 = ['main']
2 = ['VS228', 1]
3 = ['XZ242Q', 2]
4 = [4, 'DELL U2623QE', 'main']
5 = [4, 'DELL U2623QE', 'XZ242Q', 2]
6 = ['main']
